<div class="tm-page">
<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="content-wrapper">
      <mat-card class="m-t-30 mat-card-top cardWithShadow position-relative overflow-hidden p-24 d-flex justify-content-center align-items-center">
        <img src="assets/images/talent-match.png" alt="Talent Match Logo" style="max-width: 100%; height: auto; max-height: 80px;">
      </mat-card>
    </div>
  </div>
  <div class="row justify-content-center m-t-16">
    <div class="content-wrapper">
      <mat-card class="mat-card-top cardWithShadow position-relative p-24">
        <app-talent-match-filters
          [positions]="positions"
          [practiceAreas]="practiceAreas"
          (filtersChange)="onFiltersChange($event)">
        </app-talent-match-filters>
        <div class="m-t-16 m-b-8" [formGroup]="clientForm">
          <h4 class="f-w-600 m-b-8">Intake Submission</h4>
          <div class="row">
            <div class="col-md-6 col-12">
              <mat-form-field appearance="outline" class="w-100">
                <mat-label>Name </mat-label>
                <input matInput formControlName="name">
              </mat-form-field>
            </div>
            <div class="col-md-6 col-12">
              <mat-form-field appearance="outline" class="w-100">
                <mat-label>Email </mat-label>
                <input matInput type="email" formControlName="email">
                <mat-error *ngIf="clientForm.get('email')?.hasError('email')">Invalid email</mat-error>
              </mat-form-field>
            </div>
            <div class="col-md-6 col-12">
              <mat-form-field appearance="outline" class="w-100">
                <mat-label>Phone Number </mat-label>
                <input matInput type="tel" formControlName="phone">
                <mat-error *ngIf="clientForm.get('phone')?.hasError('pattern')">Invalid phone number</mat-error>
              </mat-form-field>
            </div>
            <div class="col-md-6 col-12">
              <mat-form-field appearance="outline" class="w-100">
                <mat-label>Company </mat-label>
                <input matInput formControlName="company">
              </mat-form-field>
            </div>
          </div>
        </div>
        <div class="d-flex justify-content-center align-items-center m-t-16">
          <app-match
            appearance="outline"
            class="flex-grow-1 hide-hint m-b-0"
            style="max-width: 600px"
            [aiEnabled]="false"
            [canSearch]="true"
            [searchDisabled]="!filters.position_id"
            [skipCooldown]="true"
            [showCustomSearch]="false"
            [query]="query"
            placeholder="Search candidates..."
            (searchRequest)="onManualSearch($event)">
          </app-match>
        </div>
        <div class="m-t-16">
          <app-talent-match-table
            [dataSource]="dataSource"
            [displayedColumns]="displayedColumns"
            [totalRecords]="totalRecords"
            [pageSize]="pageSize"
            [loading]="loading"
            [hideEmpty]="!!errorMessage"
            (pageChange)="onPageChange($event)"
            [sortBy]="sortBy"
            [sortOrder]="sortOrder"
            (sortChange)="onSortChange($event)">
          </app-talent-match-table>
        </div>
      </mat-card>
    </div>
  </div>
</div>
</div>
